BaseConfig:
  minDetectorConfidence: 0.5000    

TargetManagement:
  enableBboxUnClipping: 1    
  preserveStreamUpdateOrder: 0    
  maxTargetsPerStream: 150

  # [Creation & Termination Policy]
  minIouDiff4NewTarget: 0.4000  
  minTrackerConfidence: 0.2000  
  probationAge: 1    
  maxShadowTrackingAge: 300   
  earlyTerminationAge: 20    

TrajectoryManagement:
  useUniqueID: 0    

DataAssociator:
  dataAssociatorType: 0    
  associationMatcherType: 1   
  checkClassMatch: 1    

  # [Association Metric: Thresholds]
  minMatchingScore4Overall: 0.05    
  minMatchingScore4SizeSimilarity: 0.0    
  minMatchingScore4Iou: 0.0    
  minMatchingScore4VisualSimilarity: 0.05    

  # [Association Metric: Weights]
  matchingScoreWeight4VisualSimilarity: 0.9500    
  matchingScoreWeight4SizeSimilarity: 0.0500    
  matchingScoreWeight4Iou: 0.0000    

  # [Association Metric: Tentative detections]
  tentativeDetectorConfidence: 0.1000    
  minMatchingScore4TentativeIou: 0.0000    

StateEstimator:
  stateEstimatorType: 1    

  # [Dynamics Modeling]
  processNoiseVar4Loc: 100.0000    
  processNoiseVar4Size: 10.0000   
  processNoiseVar4Vel: 1000.0000    
  
  measurementNoiseVar4Detector: 2.0000   
  measurementNoiseVar4Tracker: 50.0000    

VisualTracker:
  visualTrackerType: 1    
  # [NvDCF: Feature Extraction]
  useColorNames: 1    
  useHog: 1    
  featureImgSizeLevel: 3   
  featureFocusOffsetFactor_y: -0.2000    

  # [NvDCF: Correlation Filter]
  filterLr: 0.0500    
  filterChannelWeightsLr: 0.0500
  gaussianSigma: 0.7500  
  searchRegionPaddingScale: 4.0